<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Globe in Space (CSS 3D)</title>
  <style>
    :root{
      --scene-size: min(92vw, 900px);
      --globe-radius: 140px; /* controls globe size */
      --star-count: 250;
      --bg1: #03020a;
      --bg2: #050a1f;
    }

    body{
      margin:0;
      height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(1200px 700px at 50% 40%, var(--bg2), var(--bg1));
      color:#fff;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow:hidden;
    }

    /* Scene wrapper */
    .scene{
      width: var(--scene-size);
      height: var(--scene-size);
      position:relative;
      perspective: 900px;
      user-select:none;
      touch-action: none;
    }

    /* Stars layer */
    .stars{
      position:absolute;
      inset:-10%;
      transform: translateZ(-600px);
      pointer-events:none;
    }

    .star{
      position:absolute;
      width:2px;
      height:2px;
      border-radius:50%;
      background: rgba(255,255,255,.9);
      box-shadow:
        0 0 6px rgba(140,200,255,.6),
        0 0 14px rgba(140,200,255,.25);
      opacity: .9;
      animation: twinkle var(--tw, 3.2s) ease-in-out infinite;
    }

    @keyframes twinkle{
      0%, 100% { transform: scale(1); opacity: .65; }
      50% { transform: scale(1.8); opacity: 1; }
    }

    /* Subtle nebula haze */
    .haze{
      position:absolute;
      inset:-25%;
      pointer-events:none;
      background:
        radial-gradient(circle at 30% 30%, rgba(90,160,255,.18), transparent 45%),
        radial-gradient(circle at 70% 60%, rgba(180,90,255,.12), transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(80,255,210,.09), transparent 55%);
      filter: blur(10px);
      transform: translateZ(-400px);
      opacity:.95;
    }

    /* Globe system */
    .rig{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      transform-style: preserve-3d;
    }

    /* "Suspended" effect: a little platform ring + slight shadow */
    .suspender{
      position:absolute;
      width: 520px;
      height: 520px;
      border-radius:50%;
      border: 2px solid rgba(160,220,255,.08);
      transform-style: preserve-3d;
      transform: translateY(10px) translateZ(-120px) rotateX(65deg);
      filter: blur(.2px);
      opacity:.8;
      pointer-events:none;
    }

    /* The actual rotating globe container */
    .globe-wrap{
      width: calc(var(--globe-radius) * 2);
      height: calc(var(--globe-radius) * 2);
      position:relative;
      transform-style: preserve-3d;
      transform: translateZ(0px);
    }

    /* Multiple latitude slices to fake a sphere */
    .globe{
      position:absolute;
      inset:0;
      transform-style: preserve-3d;
      /* JS updates rotation on this element */
      transform: rotateX(var(--rx, -15deg)) rotateY(var(--ry, 25deg));
      transition: transform 120ms linear;
    }

    .slice{
      position:absolute;
      left:50%;
      top:50%;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      /* Each slice is rotated around Y and offset by Z */
    }

    .strip{
      position:absolute;
      left:50%;
      top:50%;
      transform-style: preserve-3d;
      width: calc(var(--globe-radius) * 2);
      height: calc(var(--globe-radius) * 0.45);
      transform: translate(-50%, -50%);
      backface-visibility: hidden;
      border-radius: 999px;
      /* "Earth" look: gradients (no external images) */
      background:
        radial-gradient(120% 80% at 50% 40%, rgba(110,220,255,.55), rgba(0,0,0,0) 52%),
        linear-gradient(90deg,
          rgba(10,120,70,.85),
          rgba(20,180,120,.95) 35%,
          rgba(60,140,210,.9) 60%,
          rgba(10,120,70,.85)
        );
      box-shadow:
        inset 0 0 20px rgba(0,0,0,.25),
        inset 0 0 70px rgba(0,0,0,.2);
      filter: saturate(1.1) contrast(1.05);
      opacity: .98;
      /* Add a subtle texture-like speckle */
      background-image:
        radial-gradient(120% 80% at 50% 40%, rgba(110,220,255,.55), rgba(0,0,0,0) 52%),
        linear-gradient(90deg,
          rgba(10,120,70,.85),
          rgba(20,180,120,.95) 35%,
          rgba(60,140,210,.9) 60%,
          rgba(10,120,70,.85)
        ),
        repeating-radial-gradient(circle at 30% 40%, rgba(255,255,255,.10), rgba(255,255,255,0) 2px);
      background-blend-mode: screen, normal, overlay;
    }

    /* Atmospheric glow */
    .atmosphere{
      position:absolute;
      inset: -14px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 40% 35%, rgba(120,210,255,.35), transparent 55%),
        radial-gradient(circle at 50% 60%, rgba(80,140,255,.22), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), rgba(255,255,255,0) 60%);
      filter: blur(1px);
      transform: translateZ(30px);
      pointer-events:none;
      opacity:.95;
    }

    .hint{
      position:absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(220,245,255,.8);
      letter-spacing:.2px;
      text-shadow: 0 0 14px rgba(120,200,255,.25);
      pointer-events:none;
      opacity:.9;
    }

    /* Make it responsive-ish on small screens */
    @media (max-width: 420px){
      .suspender{ width: 430px; height: 430px; }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene" aria-label="3D rotating globe in space">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="haze" aria-hidden="true"></div>

    <div class="rig">
      <div class="suspender" aria-hidden="true"></div>

      <div class="globe-wrap">
        <div class="globe" id="globe">
          <!-- JS fills slices -->
          <div class="atmosphere" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <div class="hint">Drag to rotate</div>
  </div>

  <script>
    // ---------- Stars ----------
    (function makeStars(){
      const starsEl = document.getElementById('stars');
      const count = 260; // "a bunch of stars"

      for(let i=0;i<count;i++){
        const s = document.createElement('div');
        s.className = 'star';

        // random positions in a box, biased outward a bit
        const x = Math.random() * 100;
        const y = Math.random() * 100;

        const size = (Math.random() < 0.12 ? 2 : 1) + Math.random()*1.2;
        const opacity = 0.4 + Math.random()*0.6;

        const tw = 1.8 + Math.random()*4.0;

        // Give stars a tiny parallax depth by varying translateZ
        const z = -200 - Math.random()*850;

        s.style.left = x + '%';
        s.style.top = y + '%';
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.opacity = opacity;
        s.style.setProperty('--tw', tw + 's');

        s.style.transform = `translateZ(${z}px)`;

        starsEl.appendChild(s);
      }
    })();

    // ---------- Globe slices ----------
    (function makeGlobe(){
      const globe = document.getElementById('globe');
      const radius = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--globe-radius')) || 140;

      // Slices correspond to latitude bands; more slices => smoother sphere
      const bands = 26; // tweak for quality
      for(let i=0;i<bands;i++){
        const t = i/(bands-1); // 0..1
        const angle = (t - 0.5) * Math.PI; // -pi/2..pi/2
        const bandH = Math.cos(angle) * (radius*0.95);
        const yScale = Math.cos(angle); // for subtle curvature

        const depth = Math.sin(angle) * radius; // z offset to form sphere illusion

        const slice = document.createElement('div');
        slice.className = 'slice';

        // Each slice is a "ring strip" rotated around X and scaled vertically
        slice.style.transform =
          `translate(-50%, -50%) rotateX(${(t-0.5)*180}deg) translateZ(${depth}px)`;

        // The visible strip (a pill/ellipse) scaled to match latitude
        const strip = document.createElement('div');
        strip.className = 'strip';

        const stripHeight = Math.max(16, bandH*0.5);
        strip.style.height = stripHeight + 'px';
        strip.style.opacity = 0.92 + Math.random()*0.06;

        // Subtle variation to look less uniform
        strip.style.filter = `saturate(${1.0 + Math.random()*0.15}) contrast(1.05)`;

        // Position strip at center of slice
        strip.style.transform = `translate(-50%, -50%) scaleY(${Math.max(0.6, yScale)})`;

        slice.appendChild(strip);

        slice.style.left = '50%';
        slice.style.top = '50%';

        globe.appendChild(slice);
      }
    })();

    // ---------- Rotation controls ----------
    (function rotator(){
      const globe = document.getElementById('globe');

      let isDown = false;
      let startX = 0, startY = 0;
      let startRX = 0, startRY = 0;

      // Current angles in degrees
      let rx = -15;
      let ry = 25;

      function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

      function apply(){
        globe.style.setProperty('--rx', rx + 'deg');
        globe.style.setProperty('--ry', ry + 'deg');
      }
      apply();

      const scene = document.getElementById('scene');

      // Mouse
      scene.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.clientX;
        startY = e.clientY;

        const cs = getComputedStyle(globe);
        startRX = parseFloat(cs.getPropertyValue('--rx')) || rx;
        startRY = parseFloat(cs.getPropertyValue('--ry')) || ry;
      });

      window.addEventListener('mousemove', (e) => {
        if(!isDown) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        ry = startRY + dx * 0.2;
        rx = startRX - dy * 0.2;

        rx = clamp(rx, -85, 85);
        apply();
      });

      window.addEventListener('mouseup', () => { isDown = false; });

      // Touch
      scene.addEventListener('touchstart', (e) => {
        if(!e.touches || !e.touches.length) return;
        isDown = true;

        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;

        const cs = getComputedStyle(globe);
        startRX = parseFloat(cs.getPropertyValue('--rx')) || rx;
        startRY = parseFloat(cs.getPropertyValue('--ry')) || ry;
      }, { passive: true });

      scene.addEventListener('touchmove', (e) => {
        if(!isDown || !e.touches || !e.touches.length) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;

        ry = startRY + dx * 0.2;
        rx = startRX - dy * 0.2;

        rx = clamp(rx, -85, 85);
        apply();
      }, { passive: true });

      scene.addEventListener('touchend', () => { isDown = false; });
      scene.addEventListener('touchcancel', () => { isDown = false; });

      // Optional: gentle auto-spin when not interacting
      let lastInteraction = performance.now();
      scene.addEventListener('mousedown', () => lastInteraction = performance.now());
      scene.addEventListener('touchstart', () => lastInteraction = performance.now());

      function tick(t){
        if(!isDown && (t - lastInteraction) > 700){
          ry += 0.08;
          apply();
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
