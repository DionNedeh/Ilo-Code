<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Puzzle Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }
        #game-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        #puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            margin-top: 20px;
        }
        .tile {
            width: 100%;
            height: 100%;
            background-color: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .tile:hover {
            background-color: #45a049;
        }
        .hidden {
            background-color: #cccccc !important;
            cursor: default;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Simple Tile Puzzle</h1>
        <p>Click the tiles to reveal their hidden content!</p>
        <div id="puzzle-grid">
            <!-- Tiles will be generated by JavaScript -->
        </div>
        <button id="check-button" onclick="checkPuzzle()">Check Solution</button>
        <p id="message"></p>
    </div>

    <script>
        const puzzleGrid = document.getElementById('puzzle-grid');
        const messageElement = document.getElementById('message');
        let tiles = [];
        const targetSolution = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // The correct order (simple sequence for this example)

        // Function to shuffle an array (Fisher-Yates algorithm)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Initialize the puzzle state and render tiles
        function initializeGame() {
            // Create an array of numbers to shuffle
            let gameValues = Array.from({ length: 9 }, (_, i) => i + 1); // Numbers 1 to 9
            shuffle(gameValues);
            tiles = gameValues;

            puzzleGrid.innerHTML = ''; // Clear existing content

            tiles.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.textContent = value;
                tile.dataset.value = value;
                tile.onclick = () => revealTile(tile, value);
                puzzleGrid.appendChild(tile);
            });
        }

        // Function to reveal a tile when clicked
        function revealTile(tileElement, value) {
            if (tileElement.classList.contains('hidden')) {
                tileElement.textContent = value; // Show the number/content
                tileElement.classList.remove('hidden');
            } else {
                // Hide it again if clicked twice (optional: can be used for swapping/manipulation)
                tileElement.textContent = '';
                tileElement.classList.add('hidden');
            }
        }

        // Function to check the solution
        function checkPuzzle() {
            let isCorrect = true;
            const currentOrder = [];

            // Gather the visible values in their current order (or based on a specific criteria)
            Array.from(puzzleGrid.children).forEach(tile => {
                if (!tile.classList.contains('hidden')) {
                    currentOrder.push(parseInt(tile.dataset.value));
                }
            });

            // For this simple version, we check if the *revealed* numbers are in sequence (1, 2, 3...)
            // A more complex puzzle would require swapping logic. Here we'll just check if all were revealed correctly.
            
            // Since this is a "reveal" game, let's simplify the goal: Check if the user clicked all tiles once.
            if (currentOrder.length === 9) {
                // A true puzzle would involve matching positions. For simplicity, we'll check if they are *all* revealed.
                messageElement.textContent = "Congratulations! You have revealed all the tiles.";
                messageElement.style.color = 'green';
            } else {
                 messageElement.textContent = "Please click on all tiles to reveal them!";
                 messageElement.style.color = 'orange';
            }
        }

        // Start the game when the page loads
        window.onload = initializeGame;
    </script>

</body>
</html>
