<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Swirl Design</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a2e; /* Dark background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 30px;
            background-color: #2c2c4b;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #00ffff; /* Cyan/Light Blue for highlight */
        }
        .swirl {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #00ffff, #00bfff);
            border-radius: 50%; /* Making it circular for simplicity, representing the swirl concept */
            margin: 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: #1a1a2e; /* Dark text inside */
        }
        .eye {
            font-size: 60px;
            color: #ffffff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="eye">👁️</div>
        <h1>The Swirl Design</h1>
        <p>A simple representation of the eye icon and the dynamic blue swirl.</p>
        <div class="swirl">
            <!-- In a real scenario, you might use an SVG or complex CSS for the exact shape -->
            &mdash; Swirl Graphic &mdash;
        </div>
    </div>
</body>
</html>
